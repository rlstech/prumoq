server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker sem cache — PWA precisa sempre da versão mais recente
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Assets Expo são content-addressed (hash no nome) — cache agressivo
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — todas as rotas servem index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
