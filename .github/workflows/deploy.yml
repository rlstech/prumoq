name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rlstech/prumoq-web

jobs:
  # ── 1. Build Docker image and push to GHCR ──────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node & pnpm (smoke-test build outside Docker)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps and test Next.js build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @prumoq/web build 2>&1 | tee /tmp/build.log; BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "## ❌ Next.js build failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -80 /tmp/build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          provenance: false

  # ── 2. Create or update Portainer stack ─────────────────────────────────
  deploy:
    name: Deploy to Portainer
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy stack via Portainer API
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          STACK_NAME="prumoq"
          COMPOSE_CONTENT=$(cat docker-compose.prod.yml)

          # Build the env array for Portainer (IMAGE_TAG forces re-pull of the new image)
          ENV_JSON=$(jq -n \
            --arg tag "$IMAGE_TAG" \
            --arg key "$SUPABASE_SERVICE_ROLE_KEY" \
            '[
              {"name": "IMAGE_TAG",                "value": $tag},
              {"name": "SUPABASE_SERVICE_ROLE_KEY", "value": $key}
            ]')

          # Check if the stack already exists
          echo "→ Fetching stacks from $PORTAINER_URL/api/stacks"
          STACKS_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            "$PORTAINER_URL/api/stacks")
          HTTP_STATUS=$(echo "$STACKS_RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          STACKS_BODY=$(echo "$STACKS_RESPONSE" | grep -v "HTTP_STATUS:")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Portainer API error (HTTP $HTTP_STATUS)" >> $GITHUB_STEP_SUMMARY
            echo "$STACKS_BODY" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          STACK_ID=$(echo "$STACKS_BODY" | jq -r ".[] | select(.Name==\"$STACK_NAME\") | .Id // empty")
          SWARM_ID=$(echo "$STACKS_BODY" | jq -r ".[0].SwarmId // empty")
          echo "→ SwarmId: $SWARM_ID"

          portainer_call() {
            local METHOD=$1 URL=$2 BODY=$3
            RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X "$METHOD" \
              -H "X-API-Key: $PORTAINER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$BODY" "$URL")
            local STATUS RBODY
            STATUS=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
            RBODY=$(echo "$RESP" | grep -v "HTTP_STATUS:")
            echo "HTTP $STATUS: $RBODY"
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
              echo "❌ Portainer error $STATUS on $METHOD $URL" >> $GITHUB_STEP_SUMMARY
              echo "$RBODY" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          }

          if [ -z "$STACK_ID" ]; then
            echo "Stack '$STACK_NAME' not found — creating (swarm)..."
            portainer_call POST \
              "$PORTAINER_URL/api/stacks/create/swarm/string?endpointId=$PORTAINER_ENDPOINT_ID" \
              "$(jq -n \
                  --arg name    "$STACK_NAME" \
                  --arg swarm   "$SWARM_ID" \
                  --arg content "$COMPOSE_CONTENT" \
                  --argjson env "$ENV_JSON" \
                  '{name: $name, swarmID: $swarm, stackFileContent: $content, env: $env}')"
          else
            echo "Updating stack '$STACK_NAME' (ID: $STACK_ID) → image $IMAGE_TAG"
            portainer_call PUT \
              "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$PORTAINER_ENDPOINT_ID" \
              "$(jq -n \
                  --arg content "$COMPOSE_CONTENT" \
                  --argjson env "$ENV_JSON" \
                  '{stackFileContent: $content, env: $env, prune: false, pullImage: true}')"
          fi

          echo "✓ Deploy complete — $IMAGE_TAG"
